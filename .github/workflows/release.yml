name: Release

on:
  push:
    branches:
      - main
      - 1.x

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # main has lint/test tasks; the 1.x maintenance line only has build.
      - name: Verify
        run: pnpm turbo run ${{ github.ref == 'refs/heads/main' && 'build lint test' || 'build' }}

      # main publishes to the `latest` tag; the 1.x line publishes to `legacy`
      # so it never overwrites `latest`. With changesets present the action
      # opens a "Version Packages" PR; with none it publishes unpublished versions.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: ${{ github.ref == 'refs/heads/1.x' && 'pnpm changeset publish --tag legacy' || 'pnpm changeset publish' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
