name: Release

on:
  push:
    branches:
      - main
      - 1.x

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC: required for npm trusted publishing (tokenless)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # main has lint/test tasks; the 1.x maintenance line only has build.
      - name: Verify
        run: pnpm turbo run ${{ github.ref == 'refs/heads/main' && 'build lint test' || 'build' }}

      # Auth is via OIDC (no NPM_TOKEN). main publishes to `latest`; the 1.x
      # line publishes to `legacy` so it never overwrites `latest`. With
      # changesets present the action opens a "Version Packages" PR; with none
      # it publishes any unpublished versions (provenance is automatic).
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: ${{ github.ref == 'refs/heads/1.x' && 'pnpm changeset publish --tag legacy' || 'pnpm changeset publish' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
